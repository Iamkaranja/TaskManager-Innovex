<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        .completed { text-decoration: line-through; color: #aaa; }
        .btn-success { background-color: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .btn-danger { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        button:hover { opacity: 0.9; }

        /* Custom Modal Styles */
        .modal-overlay {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0, 0, 0, 0.5); 
            align-items: center; 
            justify-content: center; 
            z-index: 1000;
        }
        .modal-box {
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            text-align: center; 
            min-width: 300px;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
        }
        .modal-box p { font-size: 18px; margin-bottom: 20px; }
        .btn-cancel { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .btn-confirm { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-right: 10px; }
    </style>
</head>
<body>

    <h2>Task Manager</h2>
    
    <!-- Task Inputs -->
    <div>
        <input type="text" id="taskInput" placeholder="Task Title">
        <input type="text" id="descInput" placeholder="Description">
        <label><input type="checkbox" id="completedCheck"> Completed</label>
        <button onclick="createTask()">Add Task</button>
    </div>

    <!-- Tasks Table -->
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Title</th>
                <th>Description</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tasksTableBody"></tbody>
    </table>

    <!-- Custom Delete Modal -->
    <div id="deleteModal" class="modal-overlay">
        <div class="modal-box">
            <p>Are you sure you want to delete this task?</p>
            <button id="confirmDeleteBtn" class="btn-confirm">Delete</button>
            <button id="cancelDeleteBtn" class="btn-cancel">Cancel</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000';
        let taskIdToDelete = null;

        // fetch all tasks
        async function fetchTasks() {
            try {
                const response = await fetch(`${API_URL}/tasks`);
                const tasks = await response.json();
                
                const tableBody = document.getElementById('tasksTableBody');
                tableBody.innerHTML = '';
                
                tasks.forEach((task, index) => {
                    const statusText = task.completed ? 'Finished' : 'In-Progress';
                    const titleClass = task.completed ? 'completed' : '';
                    const descText = task.description ? task.description : '<i>No description</i>';
                    
                    const row = `
                        <tr>
                            <td>${index + 1}</td>
                            <td class="${titleClass}">${task.title}</td>
                            <td>${descText}</td>
                            <td>${statusText}</td>
                            <td>
                                ${!task.completed ? `<button class="btn-success" onclick="completeTask(${task.id})">Finish</button>` : ''}
                                <button class="btn-danger" onclick="deleteTask(${task.id})">Delete</button>
                            </td>
                        </tr>
                    `;
                    tableBody.insertAdjacentHTML('beforeend', row);
                });
            } catch (error) {
                console.error('Error fetching tasks:', error);
            }
        }

        // create a task
        async function createTask() {
            const titleInput = document.getElementById('taskInput');
            const descInput = document.getElementById('descInput');
            const completedInput = document.getElementById('completedCheck');
            
            const titleValue = titleInput.value.trim();
            const descValue = descInput.value.trim();
            const completedValue = completedInput.checked; 
            
            if (!titleValue) {
                alert('Please fill in a task title!');
                return;
            }

            const payload = {
                title: titleValue,
                description: descValue || null,
                completed: completedValue == true ? 1 : 0
            };

            try {
                const response = await fetch(`${API_URL}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    titleInput.value = '';
                    descInput.value = '';
                    completedInput.checked = false;
                    fetchTasks(); 
                } else {
                    const errorData = await response.json();
                    alert(`Failed to save: ${JSON.stringify(errorData.detail)}`);
                }
            } catch (error) {
                console.error('Error creating task:', error);
            }
        }

        // complete a task
        async function completeTask(id) {
            try {
                await fetch(`${API_URL}/tasks/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed: true })
                });
                fetchTasks();
            } catch (error) {
                console.error('Error completing task:', error);
            }
        }

        // tigger custom Modal
        function deleteTask(id) {
            taskIdToDelete = id; 
            const modal = document.getElementById('deleteModal');
            modal.style.display = 'flex'; 
        }

        async function proceedWithDelete() {
            if (!taskIdToDelete) return;
            
            try {
                await fetch(`${API__URL}/tasks/${taskIdToDelete}`, { method: 'DELETE' });
                closeDeleteModal();
                fetchTasks();
            } catch (error) {
                console.error('Error deleting task:', error);
            }
        }

        // hide modal & resets the ID
        function closeDeleteModal() {
            const modal = document.getElementById('deleteModal');
            modal.style.display = 'none';
            taskIdToDelete = null;
        }

        window.onload = function() {
            fetchTasks();

            document.getElementById('confirmDeleteBtn').addEventListener('click', proceedWithDelete);
            document.getElementById('cancelDeleteBtn').addEventListener('click', closeDeleteModal);

            window.addEventListener('click', (e) => {
                const modal = document.getElementById('deleteModal');
                if (e.target === modal) {
                    closeDeleteModal();
                }
            });
        };
    </script>
</body>
</html>
